<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Greedy Cat — PREDATOR BOT AI</title><style>
body{font-family:Arial;background:#020617;color:white;text-align:center;padding:20px}
h1{color:#22c55e}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px}
button{padding:12px;font-size:20px;background:#1e293b;color:white;border:none;border-radius:8px;cursor:pointer}
.section{margin-top:14px}
.active{background:#22c55e !important}
.bad{color:#ef4444}
.good{color:#22c55e}
.mid{color:#eab308}
</style></head><body><h1>Greedy Cat — PREDATOR BOT AI 🤖🔥</h1><div class="grid">
<button id="corn" onclick="add('corn')">🌽</button>
<button id="tomato" onclick="add('tomato')">🍅</button>
<button id="carrot" onclick="add('carrot')">🥕</button>
<button id="pepper" onclick="add('pepper')">🌶️</button>
<button id="fish" onclick="add('fish')">🐟</button>
<button id="shrimp" onclick="add('shrimp')">🦐</button>
<button id="cow" onclick="add('cow')">🐄</button>
<button id="chicken" onclick="add('chicken')">🐔</button>
</div><button onclick="toggleBot()">BOT: OFF</button>
<button onclick="undo()">Undo</button>
<button onclick="reset()">Reset</button>

<div class="section"><b>History</b><div id="history"></div></div>
<div class="section"><b>Heatmap</b><div id="heat"></div></div>
<div class="section"><b>Absence</b><div id="absence"></div></div>
<div class="section"><b>Trap / Pattern</b><div id="trap"></div></div>
<div class="section"><b>Mode</b><div id="mode"></div></div><div class="section"><b>Top5 (3+2)</b><div id="top5"></div></div>
<div class="section"><b>Top6 (3+3)</b><div id="top6"></div></div><div class="section"><b>Monte Carlo</b><div id="monte"></div></div>
<div class="section"><b>Confidence</b><div id="confidence"></div></div>
<div class="section"><b>Accuracy</b><div id="accuracy"></div></div><script>

const foods=["corn","tomato","carrot","pepper","fish","shrimp","cow","chicken"]
const veg=["corn","tomato","carrot","pepper"]
const meat=["fish","shrimp","cow","chicken"]

const emoji={
corn:"🌽",tomato:"🍅",carrot:"🥕",pepper:"🌶️",
fish:"🐟",shrimp:"🦐",cow:"🐄",chicken:"🐔"
}

let history=[]
let heat={}
let memory={}
let weights={}
let bot=false

let totalPred=0
let correctPred=0

foods.forEach(f=>{
heat[f]=0
weights[f]=1
})

/* ADD */

function add(f){

// learning
if(window.lastPrediction){
totalPred++
if(window.lastPrediction.includes(f)){
correctPred++
weights[f]+=0.4
}else{
window.lastPrediction.forEach(p=>weights[p]-=0.05)
}
}

history.push(f)
heat[f]++

let seq=history.slice(-3).join("-")
memory[seq]=(memory[seq]||0)+1

update()
}

function undo(){history.pop();update()}
function reset(){history=[];memory={};update()}

/* BOT */

function toggleBot(){
bot=!bot
event.target.innerText="BOT: "+(bot?"ON":"OFF")
}

/* ABSENCE */

function absence(f){
for(let i=history.length-1;i>=0;i--){
if(history[i]==f)return history.length-i
}
return history.length
}

/* FAKE PATTERN */

function fakePattern(){
let last6=history.slice(-6)
let unique=new Set(last6)
if(unique.size<=2)return "FAKE ⚠️"
return "REAL"
}

/* TRAP */

function trap(){
let last=history.slice(-4)
if(last.length<4)return "Safe"
let same=last.every(x=>x===last[0])
if(same)return "Hard Trap 🚨"
return "Safe"
}

/* PATTERN */

function patternScore(f){
let score=0
let last=history.slice(-3).join("-")
for(let key in memory){
if(key===last){
score+=memory[key]
}
}
return score
}

/* MARKOV */

function markov(f){
let score=0
let last=history[history.length-1]
for(let i=0;i<history.length-1;i++){
if(history[i]===last && history[i+1]===f){
score+=2
}
}
return score
}

/* AI */

function aiScores(){

let s={}
foods.forEach(f=>s[f]=0)

foods.forEach(f=>{
s[f]+=patternScore(f)
s[f]+=markov(f)
s[f]+=weights[f]
s[f]+=absence(f)*0.3

let last5=history.slice(-5)
let count=last5.filter(x=>x===f).length

if(count>=3)s[f]-=3
if(count==0)s[f]+=2

s[f]+=Math.random()*0.05
})

return s
}

/* MONTE */

function monte(){

let sim={}
foods.forEach(f=>sim[f]=0)

for(let i=0;i<12000;i++){

let s=aiScores()
let total=Object.values(s).reduce((a,b)=>a+b,0)

let r=Math.random()*total
let cum=0

for(let f of foods){
cum+=s[f]
if(r<=cum){
sim[f]++
break
}
}

}

return sim
}

/* STABILITY */

let lastStable=[]
let stableCount=0

function stabilize(pick){

if(JSON.stringify(pick)===JSON.stringify(lastStable)){
stableCount++
}else{
stableCount=0
}

lastStable=pick

return stableCount>=2?lastStable:pick
}

/* BALANCE */

function balance(sorted){

let vegList=sorted.filter(x=>veg.includes(x[0]))
let meatList=sorted.filter(x=>meat.includes(x[0]))

let last10=history.slice(-10)
let vegCount=last10.filter(x=>veg.includes(x)).length
let meatCount=last10.filter(x=>meat.includes(x)).length

let v=3,m=2

if(vegCount>meatCount+3){v=2;m=3}
if(meatCount<3){v=2;m=3}
if(trap().includes("Trap")){v=2;m=3}

let top5=vegList.slice(0,v).map(x=>x[0])
.concat(meatList.slice(0,m).map(x=>x[0]))

let top6=vegList.slice(0,3).map(x=>x[0])
.concat(meatList.slice(0,3).map(x=>x[0]))

return {top5,top6}
}

/* MODE */

function decisionMode(){

if(trap().includes("Trap"))return "ESCAPE ⚠️"

let last5=history.slice(-5)
let same=last5.filter(x=>x===last5[0]).length

if(same>=3)return "ATTACK 🔥"

return "SAFE ✅"
}

/* UPDATE */

function update(){

document.getElementById("history").innerHTML=
history.slice(-20).map(x=>emoji[x]).join(" ")

document.getElementById("heat").innerHTML=
foods.map(f=>emoji[f]+" "+heat[f]).join(" | ")

document.getElementById("absence").innerHTML=
foods.map(f=>emoji[f]+" "+absence(f)).join(" | ")

document.getElementById("trap").innerHTML=
trap()+" | "+fakePattern()

document.getElementById("mode").innerHTML=decisionMode()

let m=monte()
let sorted=Object.entries(m).sort((a,b)=>b[1]-a[1])

let b=balance(sorted)

let pick=stabilize(b.top5)

window.lastPrediction=pick

document.getElementById("top5").innerHTML=
pick.map(x=>emoji[x]).join(" ")

document.getElementById("top6").innerHTML=
b.top6.map(x=>emoji[x]).join(" ")

document.getElementById("monte").innerHTML=
foods.map(f=>emoji[f]+" "+m[f]).join(" | ")

/* REAL CONFIDENCE */

let total=Object.values(m).reduce((a,b)=>a+b,0)
let best=sorted[0][1]
let second=sorted[1][1]

let conf=(best/total)*100
let gap=best-second

document.getElementById("confidence").innerHTML=
"CONF: "+conf.toFixed(1)+"% | GAP: "+gap.toFixed(1)

/* ACCURACY */

let acc=totalPred?((correctPred/totalPred)*100).toFixed(1):0
document.getElementById("accuracy").innerHTML=acc+"%"

/* BOT */

foods.forEach(f=>{
document.getElementById(f).classList.remove("active")
})

if(bot){
pick.forEach(f=>{
document.getElementById(f).classList.add("active")
})
}

}

update()

</script></body>
</html>
